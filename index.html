<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Pengumpulan Tugas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #1f2937;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc 48%, #dcfce7);
    }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .header {
      margin-bottom: 24px;
      padding: 28px;
      color: white;
      background: #0f766e;
      border-radius: 8px;
      box-shadow: 0 16px 36px rgba(15, 118, 110, 0.22);
    }

    .header h1 {
      margin-bottom: 10px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.1;
    }

    .header p {
      max-width: 680px;
      color: #dffcf7;
      font-size: 16px;
      line-height: 1.6;
    }

    .content {
      padding: 28px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #dbeafe;
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.1);
    }

    .content h3 {
      margin-bottom: 18px;
      font-size: 24px;
      color: #0f766e;
    }

    .task-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .task-list button {
      min-height: 68px;
      padding: 14px 16px;
      border: 1px solid #99f6e4;
      border-radius: 8px;
      color: #134e4a;
      background: #f0fdfa;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      text-align: left;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .task-list button:hover,
    .task-list button:focus {
      outline: none;
      transform: translateY(-2px);
      background: #ccfbf1;
      box-shadow: 0 10px 22px rgba(20, 184, 166, 0.18);
    }

    .task-list button:active {
      transform: translateY(0);
    }

    .note {
      margin-top: 18px;
      color: #64748b;
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 20px, 980px);
        padding: 20px 0;
      }

      .header,
      .content {
        padding: 20px;
      }

      .task-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="header">
      <h1>Website Pengumpulan Tugas</h1>
      <p>Pilih tugas untuk membuka halaman hasil pekerjaan, atau unduh file LKPD yang sudah tersedia.</p>
    </section>

    <section class="content">
      <h3>Daftar Tugas</h3>

      <div class="task-list">
        <button onclick="openTask('tugas1.html')">Tugas 1 - Form Pemesanan</button>
        <button onclick="openTask('tugas2.html')">Tugas 2 - Tabel &amp; Puisi</button>
        <button onclick="openTask('tugas3.html')">Tugas 3 - Bikin pantun 4 bait, dan bikin CSSnya</button>
        <button onclick="openTask('projectweb1/index.html')">Tugas 4 - Project Web 1</button>
        <button onclick="openTask('tugas_portofolio/index.html')">Tugas 5 - Bikin Website Portofolio</button>
        <button onclick="downloadFile('Kelompok gak tau.docx')">Tugas 6 - Mini Project Video</button>
        <button onclick="downloadFile('Basis Data Excel KKA Demian.zip')">Tugas 7 - LKPD Praktik Basis Data Excel</button>
        <button onclick="downloadFile('LKPD Praktik Basis Data MySQL.docx')">Tugas 8 - LKPD Praktik Basis Data MySQL</button>
        <button onclick="downloadFile('LKPD Array Asosiatif (Python & PHP).zip')">Tugas 9 - LKPD Array Asosiatif (Python &amp; PHP)</button>
        <button onclick="downloadFile('LKPD PRAKTIK Pengelolaan Database MySQL via phpMyAdmin.zip')">Tugas 10 - LKPD PRAKTIK Pengelolaan Database MySQL via phpMyAdmin</button>
        <button onclick="downloadFile('ENKAPSULASI.zip')">Tugas 11 - LKPD ENKAPSULASI</button>
        <button onclick="downloadFile('LKPD_INHERINTACE.zip')">Tugas 12 - LKPD INHERITACE</button>
        <button onclick="downloadFile('abstract.zip')">Tugas 13 - LKPD Abstract Class</button>
        <button onclick="downloadFile('LKPD Pemograman.zip')">Tugas 14 - LKPD Pemograman</button>
        <button onclick="downloadFile('LKPD Flowchart.zip')">Tugas 15 - LKPD Flowchart</button>
        <button onclick="downloadFile('interface_class.zip')">Tugas 15 - LKPD Interface</button>
        <button onclick="downloadFile('Polymorphsim.zip')">Tugas 15 - LKPD Interface</button>
      </div>

      <p class="note">Website Ini Dibuat Oleh Demian Bertujuan Untuk Mengumpulkan Tugas.</p>
    </section>
  </main>

  <script>
    function openTask(filePath) {
      window.open(filePath, "_blank");
    }

    function downloadFile(fileName) {
      const link = document.createElement("a");
      link.href = fileName;
      link.download = fileName.split("/").pop();
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
